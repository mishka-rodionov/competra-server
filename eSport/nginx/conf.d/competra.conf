# Rate-limit зоны (общие для всех server-блоков).
# auth_zone — для логина/регистрации/верификации: 5 запросов в минуту с одного IP.
# api_zone  — для остального API: 60 запросов в минуту с одного IP.
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;

upstream app_backend {
    server app:8080;
    keepalive 32;
}

# HTTP → редирект на HTTPS + ACME challenge для certbot
server {
    listen 80;
    server_name competra.ru www.competra.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# www → apex (https://www.competra.ru → https://competra.ru)
server {
    listen 443 ssl;
    http2 on;
    server_name www.competra.ru;

    ssl_certificate     /etc/letsencrypt/live/competra.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/competra.ru/privkey.pem;

    return 301 https://competra.ru$request_uri;
}

# Основной HTTPS-сервер
server {
    listen 443 ssl;
    http2 on;
    server_name competra.ru;

    ssl_certificate     /etc/letsencrypt/live/competra.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/competra.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    server_tokens off;
    proxy_hide_header Server;

    # Liveness — открыто всем (UptimeRobot, Better Stack)
    location = /health {
        proxy_pass http://app_backend/health;
        access_log off;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # Readiness — отдельно, можно показать в внутренний мониторинг
    location = /health/ready {
        proxy_pass http://app_backend/health/ready;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # OpenAPI — за паролем. Файл /etc/nginx/.htpasswd монтируется из ./nginx/htpasswd
    # (в .gitignore — кладётся на сервер вручную через scp).
    location /openapi {
        auth_basic "Competra Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://app_backend;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # Логин/регистрация/верификация — жёсткий rate-limit (5 запросов в минуту)
    location ~ ^/api/user/(login|register|verify_code) {
        limit_req zone=auth_zone burst=3 nodelay;
        proxy_pass http://app_backend;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # Весь остальной API — мягкий rate-limit (60 запросов в минуту)
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://app_backend;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # Блокировка мусорных путей, которые ищут боты-сканеры
    location ~ ^/(\.env|\.git|wp-login\.php|wp-admin|phpmyadmin|admin\.php|xmlrpc\.php) {
        return 444;
    }

    # Всё, что не подошло выше — 404
    location / {
        return 404;
    }
}

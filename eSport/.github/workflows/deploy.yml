name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for compose files)
        uses: actions/checkout@v4

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,nginx/**"
          target: "/opt/competra"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          LOKI_URL: ${{ secrets.LOKI_URL }}
          LOKI_USER_ID: ${{ secrets.LOKI_USER_ID }}
          LOKI_API_KEY: ${{ secrets.LOKI_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_REPOSITORY,LOKI_URL,LOKI_USER_ID,LOKI_API_KEY
          script: |
            cd /opt/competra
            echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY" >> .env
            echo "LOKI_URL=$LOKI_URL" >> .env
            echo "LOKI_USER_ID=$LOKI_USER_ID" >> .env
            echo "LOKI_API_KEY=$LOKI_API_KEY" >> .env
            docker login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f

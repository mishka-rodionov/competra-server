services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    build: !reset null
    # Снаружи 8080 закрыт. nginx ходит к app по docker-сети как app:8080.
    # Если нужен отладочный curl с хоста — выполнить:
    #   docker compose exec app sh -c 'wget -qO- http://localhost:8080/health'
    ports: !reset null
    restart: unless-stopped

  postgres:
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"

  rabbitmq:
    restart: unless-stopped
    ports: []

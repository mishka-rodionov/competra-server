services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    build: !reset null
    # Снаружи 8080 закрыт — все запросы идут через nginx (порт 443).
    # Оставлен биндинг на localhost для отладочных curl'ов с самого сервера.
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  postgres:
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"

  rabbitmq:
    restart: unless-stopped
    ports: []
